name: Publish homebridge-nest-accfactory

on:
  # Trigger prerelease publish when package.json changes on main
  push:
    branches:
      - main
    paths:
      - package.json

  # Trigger stable publish when GitHub Release is created
  release:
    types:
      - published

  # Manual trigger if needed
  workflow_dispatch:

permissions:
  id-token: write   # Required for npm trusted publishing (OIDC)
  contents: read

env:
  NODE_PUBLISH_VERSION: 24

# Prevent overlapping publishes
concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------
  # Validate job
  # Test install/format/lint/build across OS + Node versions
  # ------------------------------------------------------------
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]

    runs-on: ${{ matrix.os }}

    steps:
      # Checkout repository
      - uses: actions/checkout@v5

      # Setup Node (matrix version)
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Install dependencies
      - run: npm ci

      # Format code (auto-fix style issues)
      - run: npm run format

      # Validate lint (should now be clean after format)
      - run: npm run lint

      # Build dist output
      - run: npm run build

      # Optional audit (non-blocking)
      - run: npm audit --audit-level=high || true

  # ------------------------------------------------------------
  # Publish job
  # Handles prerelease + stable publishing
  # ------------------------------------------------------------
  publish-npm:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      # Checkout repo again for clean publish environment
      - uses: actions/checkout@v5
        with:
          submodules: true

      # --------------------------------------------------------
      # Extract version and determine npm tag
      #
      # 0.4.0-alpha.18 -> alpha
      # 0.4.0-beta.1   -> beta
      # 0.4.0          -> latest
      # --------------------------------------------------------
      - name: Read version and determine npm tag
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          TAG=$(node -e "const v=require('./package.json').version; const m=v.match(/^[0-9]+\.[0-9]+\.[0-9]+(?:-([A-Za-z]+)\.[0-9]+)?$/); process.stdout.write(m && m[1] ? m[1] : 'latest')")
          echo "TAG=$TAG" >> "$GITHUB_ENV"

          echo "Detected version: $VERSION"
          echo "Publishing with tag: $TAG"

      # Prevent prerelease publish via GitHub Release
      - name: Enforce stable release rules
        if: github.event_name == 'release'
        run: |
          if [[ "$VERSION" == *-* ]]; then
            echo "❌ Cannot publish prerelease ($VERSION) via GitHub Release"
            exit 1
          fi

      # Prevent stable publish via push
      - name: Enforce prerelease push rules
        if: github.event_name == 'push'
        run: |
          if [[ "$VERSION" != *-* ]]; then
            echo "❌ Push publish only allowed for prerelease versions (got $VERSION)"
            exit 1
          fi

      # Setup Node for publish (always Node 24)
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_PUBLISH_VERSION }}
          registry-url: https://registry.npmjs.org/
          cache: npm

      # Install dependencies
      - run: npm ci

      # Ensure clean formatted + built output
      - run: npm run format
      - run: npm run lint
      - run: npm run build

      # Preview package contents
      - run: npm pack --dry-run

      # Publish to npm using OIDC
      - name: Publish to npm
        run: npm publish --tag "$TAG" --access public